<div id="auth-overlay" style="
  position:fixed;inset:0;background:#0f172a;
  display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="text-align:center;color:#fff">
    <div style="font-size:22px;font-weight:800;margin-bottom:8px">MK Tours — Реестр и калькулятор</div>
    <div id="auth-status" style="font-size:13px;color:#94A3B8">Загрузка...</div>
  </div>
</div>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--mk:#F25C0A;--mk2:#FF8C38;--mk-pale:#FFF2EA;--mk-mid:#FDDCC5;--font:'Manrope',sans-serif}
body,input,select,button,textarea{font-family:var(--font);font-size:14px;color:var(--color-text-primary)}
input,select{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-sm);padding:5px 8px;outline:none;width:100%}
input:focus,select:focus{border-color:var(--mk);box-shadow:0 0 0 2px rgba(242,92,10,.1)}
input[disabled]{background:#F1F5F9!important;cursor:not-allowed}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:.75rem;margin-bottom:1rem;border-bottom:1px solid var(--color-border-tertiary)}

.app-name{font-size:17px;font-weight:800;letter-spacing:-.03em}
.app-sub{font-size:11px;font-weight:400;color:var(--color-text-secondary);margin-top:1px}
nav{display:flex;gap:4px;margin-bottom:1.2rem;flex-wrap:wrap}
nav button{padding:6px 13px;font-size:12px;font-weight:500;font-family:var(--font);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}
nav button.active{border-color:var(--mk);color:var(--mk);background:var(--mk-pale);font-weight:700}
nav button:hover:not(.active){background:var(--color-background-secondary)}
.screen{display:none}.screen.on{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-secondary);margin-bottom:.4rem}
.row{display:flex;gap:8px;margin-bottom:.5rem;align-items:center}
.row label{font-size:12px;font-weight:400;color:var(--color-text-secondary);width:195px;flex-shrink:0}
.row .unit{font-size:11px;color:var(--color-text-tertiary);width:34px;text-align:right;flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:.75rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.65rem .9rem}
.metric .ml{font-size:11px;font-weight:400;color:var(--color-text-secondary);margin-bottom:2px}
.metric .mv{font-size:19px;font-weight:800;letter-spacing:-.03em}
.metric .ms{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.metric.good{background:#EAF3DE}.metric.good .mv{color:#2D6A04}
.metric.bad{background:#FCEBEB}.metric.bad .mv{color:#A32D2D}
.metric.warn{background:#FAEEDA}.metric.warn .mv{color:#854F0B}
.metric.mk{background:var(--mk-pale);border:0.5px solid var(--mk-mid)}.metric.mk .mv{color:var(--mk)}
.plr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;font-weight:400}
.plr:last-child{border-bottom:none}
.plr.tot{font-weight:700;font-size:14px;padding-top:8px;margin-top:4px;border-top:1px solid var(--color-border-secondary);border-bottom:none}
.plr.sub{color:var(--color-text-secondary);padding-left:10px;font-size:12px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px}
.badge.g{background:#EAF3DE;color:#2D6A04}.badge.r{background:#FCEBEE;color:#A32D2D}
.badge.a{background:#FAEEDA;color:#854F0B}.badge.mk{background:var(--mk-pale);color:var(--mk)}
.btn-pri{padding:7px 18px;border-radius:var(--border-radius-md);border:none;background:linear-gradient(135deg,var(--mk2) 0%,var(--mk) 100%);color:#fff;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer}
.btn-pri:hover{filter:brightness(1.07)}
.btn-sec{padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;color:var(--color-text-secondary)}
.btn-sec:hover{background:var(--color-background-secondary)}
.btn-del{width:24px;height:24px;border-radius:var(--border-radius-sm);border:0.5px solid var(--color-border-danger);color:var(--color-text-danger);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-del:hover{background:var(--color-background-danger)}
.toast{position:absolute;top:4px;right:0;padding:7px 14px;background:linear-gradient(135deg,var(--mk2),var(--mk));color:#fff;border-radius:var(--border-radius-md);font-size:11px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.hint{background:var(--mk-pale);border-left:3px solid var(--mk);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:.55rem .85rem;font-size:12px;color:#7A3000;margin-bottom:.65rem}
.reg-hdr,.reg-row{display:grid;grid-template-columns:115px 1fr 80px 80px 1fr 100px 38px;gap:5px;align-items:center;padding:5px 8px}
.reg-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-secondary)}
.reg-row{border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.reg-row input,.reg-row select{font-size:11px;padding:3px 5px}
.month-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-tertiary);padding:6px 8px 3px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.c-block{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:.6rem;overflow:visible}
.c-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--color-background-secondary);cursor:pointer;font-size:12px;font-weight:600;user-select:none;border-radius:var(--border-radius-md) var(--border-radius-md) 0 0}
.c-body{padding:9px 11px}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.d-block{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:.5rem;overflow:visible}
.d-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--color-background-secondary);cursor:pointer;font-size:12px;font-weight:700;user-select:none;border-radius:var(--border-radius-md) var(--border-radius-md) 0 0}
.d-body{padding:9px 11px}
.prog-bg{height:4px;background:var(--color-border-tertiary);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px}
.cmp-t{width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px}
.cmp-t th{padding:6px 5px;font-size:10px;font-weight:700;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);text-align:center;font-family:var(--font)}
.cmp-t td{padding:5px 7px;border:0.5px solid var(--color-border-tertiary);text-align:right;font-weight:400}
.cmp-t td:first-child{text-align:left;color:var(--color-text-secondary);font-size:11px}
.cmp-t tr:nth-child(even) td{background:var(--color-background-secondary)}
.cmp-t .best{background:#EAF3DE;color:#2D6A04;font-weight:700}
.cmp-t .worst{background:#FCEBEB;color:#A32D2D}
.cmp-t .sec-r td{background:var(--color-background-secondary);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-secondary);text-align:left}
.cal-w{position:relative;display:inline-block;flex:1}
.cal-w input{width:100%}
.cal-pop{position:absolute;z-index:9999;background:#ffffff;color:#1E293B;border:1px solid #CBD5E1;border-radius:10px;padding:.65rem;min-width:224px;box-shadow:0 8px 32px rgba(0,0,0,.22)}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;font-size:12px;font-weight:700;color:#1E293B}
.cal-nav button{background:none;border:none;cursor:pointer;font-size:14px;color:var(--color-text-secondary);padding:2px 8px;border-radius:4px;font-family:var(--font)}
.cal-nav button:hover{background:var(--mk-pale);color:var(--mk)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-grid span{font-size:11px;text-align:center;padding:4px 1px;border-radius:4px;cursor:pointer;color:#475569}
.cal-grid span.hdr{font-weight:700;cursor:default;font-size:10px;color:#94A3B8}
.cal-grid span:not(.hdr):not(.empty):hover{background:var(--mk-pale);color:var(--mk)}
.cal-grid span.today{background:var(--mk-pale);color:var(--mk);font-weight:700}
.cal-grid span.sel{background:var(--mk);color:#fff;font-weight:700}
.cal-grid span.empty{cursor:default}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);font-size:11px;font-weight:500;cursor:pointer;margin:2px}
.chip:hover{background:var(--color-background-secondary)}
.chip.sel{border-color:var(--mk);background:var(--mk-pale);color:var(--mk);font-weight:700}
.sec-h{font-size:16px;font-weight:700;letter-spacing:-.02em}
.sec-d{font-size:12px;font-weight:400;color:var(--color-text-secondary)}
.calc-inp{font-family:var(--font);font-size:13px;font-weight:500;color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.calc-inp:focus{border-color:var(--mk);box-shadow:0 0 0 2px rgba(242,92,10,.1)}
.calc-inp[type=number]:hover{border-color:var(--mk)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">

</script>
